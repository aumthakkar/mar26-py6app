name: Backstage IDP CI/CD
on:
  push:
    branches:
      - main
    paths:
      - src/**

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - name: Setup Docker
        uses: docker/setup-docker-action@v4

      - name: shorten commit_id
        shell: bash
        run: |
          echo "COMMIT_ID=${GITHUB_SHA::6}" >> ${GITHUB_ENV}

      - name: Docker login
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up QEMU # Using this step due to your image being on ARM64 platform
        uses: docker/setup-qemu-action@v4 
      
      - name: Set up Docker Buildx # Using this step due to your image being on ARM64 platform
        uses: docker/setup-buildx-action@v4
      
      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          push: true
          platforms: linux/amd64,linux/arm64
          tags: aumthakkar/py6app:${{ env.COMMIT_ID }}

    outputs:
      commit_id: ${{ env.COMMIT_ID }}

  cd:
    needs: ci
    runs-on: self-hosted
    steps:
      - name: Checkout git repo
        uses: actions/checkout@v6

      - name: Install yq utility and update the image tag
        run: |
          sudo apt update && sudo apt install python3-pip -y
          pip install yq --break-system-packages
          echo "${{ needs.ci.outputs.commit_id }}"
          yq -Yi '.image.tag = "${{ needs.ci.outputs.commit_id }}"' charts/py6app/values.yaml

      - name: Commit the changed repo back to GitHub
        uses: EndBug/add-and-commit@v9
        with:
          message: "pushed the latest image with tag: ${{ needs.ci.outputs.commit_id }}"

      - name: Install ArgoCD app
        run: |
          VERSION=$(curl -L -s https://raw.githubusercontent.com/argoproj/argo-cd/stable/VERSION)
          curl -sSL -o argocd-linux-amd64 https://github.com/argoproj/argo-cd/releases/download/v$VERSION/argocd-linux-amd64
          sudo install -m 555 argocd-linux-amd64 /usr/local/bin/argocd
          sudo chmod +x /usr/local/bin/argocd
          rm argocd-linux-amd64

      - name: ArgoCD login
        run: |
          argocd login argocd-server.argocd.svc \
          --grpc-web \
          --insecure \
          --username admin \
          --password ${{ secrets.ARGOCD_PASSWORD }} 

      - name: ArgoCD app create and app sync
        run: |
          repo="https://github.com/aumthakkar/mar26-py6app.git"
          argocd app list | grep -q ${repo} || argocd repo add ${repo}

          #If the app exists then delete it first to start afresh
          if argocd app get py6app > /dev/null 2>&1; then 
            echo "Deleting the existing py6app..."
            argocd app delete py6app --cascase --yes --wait

            #Wait for the app to get deleted
            while argocd app get py6app > /dev/null 2>&1; do
              echo "Waiting for arogcd py6app to be deleted..."
              sleep 2
            done
          fi

          # Create the app with the latest image
          argocd app create py6app \
          --dest-namespace dev \
          --dest-server https://kubernetes.default.svc \
          --path charts/py6app \
          --repo ${repo} \
          --revision main \
          --sync-option AutoCreateNamespace=true \
          --sync-policy manual \
          --values values.yaml

          argocd app sync py6app 
          argocd app wait py6app --timeout 120




      
          




    

